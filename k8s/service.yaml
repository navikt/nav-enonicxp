# ---------- Exposer service ------------
apiVersion: v1
kind: Service
metadata:
  name: xp-service
  namespace: xp
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    statefulset.kubernetes.io/pod-name: xp-set-0
  ports:
    - name: xp-port
      port: 8080
      targetPort: 8080

---
# ---------- Internal service ------------
apiVersion: v1
kind: Service
metadata:
  name: xp-intra-service
  namespace: xp
  labels:
    app: xp-app
spec:
  clusterIP: None
  selector:
    app: xp-app
  ports:
    - port: 5701
      name: hazelcast
    - port: 9300
      name: elasticsearch
  type: ClusterIP
  publishNotReadyAddresses: true